services:

  # ── Qdrant vector store ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: garrison-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (optional)
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: garrison-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./data/webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_NAME=Garrison
      - WEBUI_URL=http://localhost:3000
      # Set to false after first admin account is created
      - ENABLE_SIGNUP=true
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach Ollama on host
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
  webui_data:
